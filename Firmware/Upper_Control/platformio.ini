[env:Upper_Control]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.partitions = default_8MB.csv

; N16R2 Configuration: Quad-SPI Flash and Quad-SPI PSRAM (saves user I/O pins)
#board_build.arduino.memory_type = qio_qspi

build_flags =
#    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
#    -DARDUINO_USB_CDC_ON_BOOT=1
    -Wall -Wextra -Werror
    -fno-exceptions
    -I ./wifi
    -I ./ctl-qlcp-lib/include

upload_protocol = esptool

lib_deps =

build_src_filter =
    +<*>
    +<../wifi>
    +<../ctl-qlcp-lib/src>

lib_extra_dirs =
    ../libraries/
    ; Explicitly select only required libraries from the local monorepo
    ../../../av-libraries/
